name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  LATEST_PY_VERSION: '3.14'
  PYTEST_VERBOSE: 'true'

jobs:
  # Run unit tests for each supported python version
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.15', '3.14', '3.13', '3.12', '3.11', '3.10']

    steps:
      # Install dependencies, with caching
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: |
          uv python install ${{ matrix.python-version }}
          uv sync

      # Run tests with coverage report
      - name: Run tests
        run: uv run nox -e cov -- xml

      # Latest python version: send coverage report to codecov
      # Pre-import Codecov signing key; action's gpg --no-default-keyring import is broken on newer runners
      - name: Import Codecov GPG key
        if: ${{ matrix.python-version == env.LATEST_PY_VERSION }}
        run: gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys 27034E7FDB850E0BBC2C62FF806BB28AED779869
      - name: Upload coverage report to Codecov
        if: ${{ matrix.python-version == env.LATEST_PY_VERSION }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: true

  # Run code analysis steps via pre-commit hooks
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.LATEST_PY_VERSION }}
      - name: Run style checks & linting
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5

      # Dependency scan
      - name: Scan dependencies for known vulnerabilities
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: .
          vulnerability-service: osv

      # Summarize any dependency changes
      # TODO: Does not appear to be working with this repo
